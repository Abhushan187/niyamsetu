# .github/workflows/ci.yml
# Runs the offline test suite automatically on every pull request.
# Keeps teammates honest — a PR can't be merged if it breaks existing tests.

name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --only-binary=:all: || pip install -r requirements.txt

      - name: Run offline test suite
        working-directory: backend
        run: python tests/run_all_tests.py --offline